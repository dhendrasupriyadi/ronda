<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 11 RW 04 GPA - Sistem Informasi Ronda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #2563eb; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .camera-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 1rem; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="bg-blue-700 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-2">
            <div class="text-center md:text-left">
                <h1 class="text-xl font-extrabold tracking-tight">POS RONDA RT 11</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-blue-200">Sistem Presensi & Pelaporan</p>
            </div>
            <div class="flex gap-2">
                <button onclick="switchTab('form')" id="nav-form" class="px-4 py-2 rounded-lg bg-blue-800 text-xs font-bold">ISI PRESENSI</button>
                <button onclick="switchTab('report')" id="nav-report" class="px-4 py-2 rounded-lg hover:bg-blue-800 text-xs font-bold">LIHAT REKAP</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8 flex-grow pb-12">
        
        <!-- SECTION: FORM -->
        <section id="section-form" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-12">
                <div class="bg-white rounded-[2rem] shadow-xl p-6 md:p-10 border border-gray-100">
                    <form id="rondaForm" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-4">
                                <h3 class="text-sm font-black text-gray-800 uppercase flex items-center gap-2">
                                    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg">👥</span> Petugas Malam Ini
                                </h3>
                                <div id="petugasInputs" class="space-y-3"></div>
                            </div>

                            <div class="space-y-4">
                                <h3 class="text-sm font-black text-gray-800 uppercase flex items-center gap-2">
                                    <span class="p-2 bg-orange-100 text-orange-600 rounded-lg">📝</span> Laporan Tambahan
                                </h3>
                                <div class="space-y-3">
                                    <input type="text" id="konsumsi" placeholder="PEMBERI KONSUMSI" required class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 font-bold text-xs uppercase">
                                    <textarea id="keterangan" placeholder="CATATAN / KEJADIAN" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 font-bold text-xs uppercase h-24"></textarea>
                                </div>

                                <div class="camera-box mt-4">
                                    <div id="camStatus" class="text-center z-10">
                                        <div class="loader mx-auto mb-2"></div>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Mempersiapkan Kamera...</p>
                                    </div>
                                    <video id="video" autoplay playsinline muted class="hidden"></video>
                                    <div id="photoPreview" class="hidden absolute inset-0 z-20">
                                        <img id="capturedPhoto" class="w-full h-full object-cover">
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button type="button" id="btnAmbil" onclick="takePhoto()" class="flex-1 bg-gray-900 text-white text-[10px] font-black py-3 rounded-xl hidden uppercase">Ambil Foto Bukti</button>
                                    <button type="button" id="btnUlang" onclick="retakePhoto()" class="flex-1 bg-red-50 text-red-600 text-[10px] font-black py-3 rounded-xl hidden uppercase">Foto Ulang</button>
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all flex justify-center items-center">
                            SIMPAN DATA RONDA
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- SECTION: REPORT -->
        <section id="section-report" class="hidden space-y-6">
            <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                <div class="p-6 bg-gray-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="font-black text-gray-800 uppercase text-sm">Rekapitulasi Kehadiran</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Laporan Bulanan RT 11</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <input type="month" id="monthFilter" class="bg-white border p-2 rounded-lg text-xs font-bold outline-none flex-1 md:w-40">
                        <button id="btnPdf" onclick="downloadPDF()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-black shadow-md hover:bg-blue-700 flex items-center justify-center min-w-[120px]">
                            <span id="pdfLabel">UNDUH PDF</span>
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white text-[9px] uppercase text-gray-400 font-black border-b">
                            <tr>
                                <th class="px-6 py-4">Waktu</th>
                                <th class="px-6 py-4">Petugas</th>
                                <th class="px-6 py-4">Konsumsi</th>
                                <th class="px-6 py-4">Foto</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-50 text-xs"></tbody>
                    </table>
                </div>
                <div id="loadingData" class="p-10 text-center">
                    <div class="loader mx-auto mb-2"></div>
                    <p class="text-xs text-gray-400 font-bold uppercase italic">Memuat Data Cloud...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER APLIKASI -->
    <footer class="py-6 text-center text-gray-400 border-t border-gray-100 bg-white">
        <p class="text-[10px] font-bold uppercase tracking-widest">© Dody & Vidy 2026</p>
    </footer>

    <canvas id="canvas"></canvas>

    <template id="petugasTemplate">
        <div class="flex flex-col sm:flex-row gap-2 items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
            <input type="text" placeholder="NAMA" required class="flex-1 w-full bg-white border border-gray-200 p-2 rounded-lg text-xs font-bold uppercase outline-none focus:ring-1 focus:ring-blue-500">
            <select class="w-full sm:w-32 bg-white border border-gray-200 p-2 rounded-lg text-xs font-bold outline-none cursor-pointer">
                <option value="HADIR">HADIR</option>
                <option value="SAKIT">SAKIT</option>
                <option value="IJIN">IJIN</option>
                <option value="ALPHA">ALPHA</option>
            </select>
        </div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT9cm-V36mCCcdrQIvhbPqrgtE-snk_6Y",
            authDomain: "ronda-rt11.firebaseapp.com",
            projectId: "ronda-rt11",
            storageBucket: "ronda-rt11.firebasestorage.app",
            messagingSenderId: "470889881435",
            appId: "1:470889881435:web:4253a2696b4c231598c47e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "ronda-rt11-rekap-final";

        let allLogs = [];
        let photoData = "";

        // UI Prep
        const container = document.getElementById('petugasInputs');
        const template = document.getElementById('petugasTemplate');
        for(let i=1; i<=5; i++){
            const clone = template.content.cloneNode(true);
            clone.querySelector('input').placeholder = `PETUGAS ${i}`;
            container.appendChild(clone);
        }

        // Camera
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photoPreview');
        const capturedPhoto = document.getElementById('capturedPhoto');
        const camStatus = document.getElementById('camStatus');
        const btnAmbil = document.getElementById('btnAmbil');
        const btnUlang = document.getElementById('btnUlang');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    video.classList.remove('hidden');
                    camStatus.classList.add('hidden');
                    btnAmbil.classList.remove('hidden');
                };
            } catch (err) {
                camStatus.innerHTML = '<p class="text-red-500 font-bold text-[10px] uppercase">Gagal Membuka Kamera</p>';
            }
        }

        window.takePhoto = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            photoData = canvas.toDataURL('image/jpeg', 0.5);
            capturedPhoto.src = photoData;
            photoPreview.classList.remove('hidden');
            btnAmbil.classList.add('hidden');
            btnUlang.classList.remove('hidden');
        };

        window.retakePhoto = () => {
            photoData = "";
            photoPreview.classList.add('hidden');
            btnAmbil.classList.remove('hidden');
            btnUlang.classList.add('hidden');
        };

        // Auth & Firestore
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'logs'));
                onSnapshot(q, (snap) => {
                    allLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allLogs.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderData();
                    document.getElementById('loadingData').classList.add('hidden');
                });
            } else {
                await signInAnonymously(auth);
            }
        });

        document.getElementById('rondaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!photoData) return alert("Wajib foto bukti!");
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div>';
            const petugasList = Array.from(document.querySelectorAll('#petugasInputs > div')).map(row => ({
                nama: row.querySelector('input').value.toUpperCase(),
                status: row.querySelector('select').value
            }));
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    petugas: petugasList,
                    konsumsi: document.getElementById('konsumsi').value.toUpperCase(),
                    keterangan: document.getElementById('keterangan').value.toUpperCase(),
                    foto: photoData,
                    timestamp: serverTimestamp()
                });
                alert("Laporan Tersimpan!");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "SIMPAN DATA RONDA";
            }
        });

        function renderData() {
            const tableBody = document.getElementById('tableBody');
            const monthVal = document.getElementById('monthFilter').value;
            const filtered = allLogs.filter(log => {
                if(!monthVal) return true;
                const d = new Date(log.timestamp?.seconds * 1000);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthVal;
            });
            if(filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400 font-bold uppercase italic text-[10px]">Kosong</td></tr>';
                return;
            }
            tableBody.innerHTML = filtered.map(log => {
                const dt = log.timestamp ? new Date(log.timestamp.seconds * 1000) : new Date();
                const pList = log.petugas.map(p => `<div class="flex justify-between items-center mb-1"><span>${p.nama}</span> <span class="px-1 py-0.5 rounded text-[7px] ${getStatusClass(p.status)}">${p.status}</span></div>`).join('');
                return `<tr class="border-b border-gray-50"><td class="px-4 py-3 font-bold">${dt.toLocaleDateString('id-ID')}<br><span class="text-blue-500 text-[9px]">${dt.toLocaleTimeString('id-ID')}</span></td><td class="px-4 py-3 w-48">${pList}</td><td class="px-4 py-3 uppercase text-gray-600">${log.konsumsi}</td><td class="px-4 py-3"><img src="${log.foto}" class="w-10 h-10 object-cover rounded shadow-sm"></td></tr>`;
            }).join('');
        }

        function getStatusClass(s) {
            if(s === 'HADIR') return 'bg-green-100 text-green-700';
            if(s === 'SAKIT') return 'bg-blue-100 text-blue-700';
            if(s === 'IJIN') return 'bg-yellow-100 text-yellow-700';
            return 'bg-red-100 text-red-700';
        }

        // PDF Logic (Fixed for Images + Copyright)
        window.downloadPDF = async function() {
            const btn = document.getElementById('btnPdf');
            const lbl = document.getElementById('pdfLabel');
            
            try {
                if (!window.jspdf) {
                    alert("Tunggu library PDF...");
                    return;
                }

                btn.disabled = true;
                lbl.innerText = 'MEMPROSES...';

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const monthVal = document.getElementById('monthFilter').value || "Semua Periode";

                const addFooter = (docInstance) => {
                    const pageCount = docInstance.internal.getNumberOfPages();
                    for (let i = 1; i <= pageCount; i++) {
                        docInstance.setPage(i);
                        docInstance.setFontSize(8);
                        docInstance.setTextColor(150);
                        docInstance.text("© Dody & Vidy 2026", 105, 290, { align: 'center' });
                    }
                };

                // Hal 1: Stats
                doc.setFontSize(16);
                doc.setTextColor(37, 99, 235);
                doc.text("LAPORAN RONDA RT 11 RW 04", 105, 15, { align: 'center' });
                doc.setFontSize(9);
                doc.setTextColor(100);
                doc.text(`Periode: ${monthVal} | Dicetak: ${new Date().toLocaleString('id-ID')}`, 105, 22, { align: 'center' });

                const stats = {};
                allLogs.forEach(log => {
                    log.petugas.forEach(p => {
                        if(!p.nama) return;
                        if(!stats[p.nama]) stats[p.nama] = { hadir: 0, sakit: 0, ijin: 0, alpha: 0 };
                        const s = p.status.toLowerCase();
                        if(stats[p.nama].hasOwnProperty(s)) stats[p.nama][s]++;
                    });
                });

                const statRows = Object.keys(stats).map(name => [
                    name, stats[name].hadir, stats[name].sakit, stats[name].ijin, stats[name].alpha, 
                    (stats[name].hadir + stats[name].sakit + stats[name].ijin + stats[name].alpha)
                ]);

                doc.autoTable({
                    startY: 30,
                    head: [['NAMA WARGA', 'H', 'S', 'I', 'A', 'TOTAL']],
                    body: statRows,
                    theme: 'grid',
                    headStyles: { fillColor: [37, 99, 235] },
                    styles: { fontSize: 8 },
                    margin: { left: 14, right: 14 }
                });

                // Hal 2+: Details with Photos
                doc.addPage();
                doc.setTextColor(37, 99, 235);
                doc.setFontSize(12);
                doc.text("DETAIL KEHADIRAN & BUKTI FOTO", 14, 15);

                const detailRows = allLogs.map(log => [
                    log.timestamp ? new Date(log.timestamp.seconds * 1000).toLocaleDateString('id-ID') : '-',
                    log.petugas.map(p => `${p.nama}(${p.status.charAt(0)})`).join(', '),
                    log.konsumsi,
                    '' // Cell for Image
                ]);

                doc.autoTable({
                    startY: 20,
                    head: [['TGL', 'PETUGAS', 'KONSUMSI', 'FOTO BUKTI']],
                    body: detailRows,
                    theme: 'striped',
                    styles: { fontSize: 8, minCellHeight: 25, verticalLineColor: 255 },
                    columnStyles: { 3: { cellWidth: 30 } },
                    didDrawCell: (data) => {
                        if (data.section === 'body' && data.column.index === 3) {
                            const log = allLogs[data.row.index];
                            if (log && log.foto) {
                                try {
                                    doc.addImage(log.foto, 'JPEG', data.cell.x + 2, data.cell.y + 2, 26, 20);
                                } catch (e) {}
                            }
                        }
                    }
                });

                addFooter(doc);
                doc.save(`RONDA_RT11_${monthVal.replace('-','_')}.pdf`);

            } catch (error) {
                alert("Gagal PDF. Gunakan Chrome.");
            } finally {
                btn.disabled = false;
                lbl.innerText = 'UNDUH PDF';
            }
        };

        window.switchTab = (tab) => {
            document.getElementById('section-form').classList.toggle('hidden', tab !== 'form');
            document.getElementById('section-report').classList.toggle('hidden', tab !== 'report');
            document.getElementById('nav-form').classList.toggle('bg-blue-800', tab === 'form');
            document.getElementById('nav-report').classList.toggle('bg-blue-800', tab === 'report');
        };

        document.getElementById('monthFilter').addEventListener('change', renderData);
        window.onload = initCamera;
    </script>
</body>
</html>
